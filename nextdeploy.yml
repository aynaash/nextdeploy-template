# nextdeploy.yml — the whole deploy, one file, committed to your repo.
#
# First run:  nextdeploy prepare   (provisions the VPS — once per server)
#             nextdeploy secrets load .env.production
#             nextdeploy ship      (build + deploy; writes dns.md for HTTPS)
# After that: nextdeploy ship
version: "1.0"
target_type: vps

app:
  name: nextdeploy-template
  port: 3000
  environment: production
  domain: example.com # <- your domain — Caddy auto-provisions TLS

servers:
  - name: prod
    host: 203.0.113.10 # <- your VPS IP or hostname
    port: 22
    username: ubuntu # an SSH user that can sudo
    key_path: ~/.ssh/id_rsa

ssl:
  enabled: true
  provider: letsencrypt
  email: admin@example.com # <- cert notifications
  auto_renew: true

logging:
  enabled: true
  stream_logs: true
